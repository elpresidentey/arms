version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: arms_postgres
    environment:
      POSTGRES_DB: arms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arms_network

  redis:
    image: redis:7-alpine
    container_name: arms_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arms_backend
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_NAME=arms_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-super-secret-jwt-key-here
      - FRONTEND_URL=http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - arms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arms_frontend
    environment:
      - VITE_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - arms_network

volumes:
  postgres_data:
  redis_data:

networks:
  arms_network:
    driver: bridge